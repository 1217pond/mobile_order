<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>確認</title>
    <style>
        :root{
            font-size: 4vw;
            font-family: sans-serif;
        }
        .gray_box{
            background-color: #bbb;
            padding: 1rem;
            font-size: 2rem;
            text-align: center;
        }
        button{
            margin: 15vw;
            font-size:2rem;
            width: 60vw;
        }
        .popup-window{
            top: 0;
            left: 0;
            width: 100vw;
            height:100vh;
            position: fixed;
            z-index:10;
            pointer-events: all;
            background-color: #000000d0;
            font-size: 2rem;
            color: white;
            text-align: center;
            padding-top: 20rem;
        }
    </style>
</head>
<body>
    <h1>注文番号</h1>
    <div class="gray_box" id="order_id"></div>
    <h1>座席番号</h1>
    <div class="gray_box" id="seat_id"></div>
    <h1>合計金額</h1>
    <div class="gray_box" id="total_price"></div>
    <h1>注文内容</h1>
    <div class="gray_box" id="order_list"></div>
    <button id="complete_trg">完了</button>
    <div id="wait_window" class="popup-window" style="display:none"></div>
    <script
        src="https://code.jquery.com/jquery-4.0.0.slim.min.js"
        integrity="sha256-8DGpv13HIm+5iDNWw1XqxgFB4mj+yOKFNb+tHBZOowc="
        crossorigin="anonymous"></script>

    <script>
        window.SERVER_ADDRESS = "https://script.google.com/macros/s/AKfycbzcC6BAv4YC3DLHGX4RxLZL1ro8YcS-KJJwauU8rZSp0weYaekcyuMI-EQOfGJcwsW0Kw/exec";

        const queryString = window.location.search;
        const urlParams = new URLSearchParams(queryString);
        const order_data = {
            "kebab":{
                "price":0,
                "name":"ケバブ ※チケットをもらう！！"
            },
            "nope":{
                "price":150,
                "name":"NOPE"
            },
            "ice":{
                "price":80,
                "name":"かき氷"
            },
            "crepe":{
                "price":120,
                "name":"クレープ"
            },
            "chicken":{
                "price":130,
                "name":"焼き鳥"
            },
            "doritos":{
                "price":100,
                "name":"ドリトス"
            },
        };
        $("#order_id").text(urlParams.get("o"));
        $("#seat_id").text("s-"+urlParams.get("s"));
        order_text = "";
        total_price = 0;
        for(let [meal_id,meal_info] of Object.entries(order_data)){
            if(Number(urlParams.get(meal_id))>0){
                order_text += `${meal_info.name} × ${urlParams.get(meal_id)}<br>`;
                total_price += meal_info.price * Number(urlParams.get(meal_id));
            }
        }
        $("#total_price").text(`¥${total_price}-`);
        $("#order_list").html(order_text);

        $("#complete_trg").on("click",e=>{
            $("#wait_window").show();
            $("#wait_window").text("完了処理中");
            fetch(SERVER_ADDRESS,{
                method:"POST",
                headers: {
                    'Content-Type': 'text/plain'
                },
                body: JSON.stringify({
                    type:"complete",
                    uuid:urlParams.get("u")
                })
            })
            .then(response => {
                if (response.ok) {
                    return response.json();
                }else{
                    throw new Error("Network response was not ok");
                }
            })
            .then(data => {
                if(data.result == "OK"){
                    $("#wait_window").text("完了しました。");
                    console.log(data);
                }else{
                    throw new Error(`ServerException: ${data.result}`);
                }
            })
            .catch(e => {
                $("#wait_window").text(`完了処理に失敗しました。少し時間を空けてからページを再読込してください。\n(${e.name}:${e.message})`);
                $("#wait_window").show();
                console.error('There was a problem with the fetch operation:', e);
            });
        });
    </script>
</body>
</html>
